<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Logo.png">
<title>Register - SkyBook</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f7;
}

/* Header */
header{
    background:#0d47a1;
    color:white;
    padding:20px 50px;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
}

.logo{
    justify-self:start;
    font-size:30px;
    font-weight:bold;
}

.logo span{
    display:block;
    font-size:14px;
    font-weight:normal;
}

nav{
    justify-self:center;
}

nav ul{
    display:flex;
    list-style:none;
    gap:40px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-weight:500;
    transition:0.3s;
}

nav ul li a:hover{
    color:#bfdbfe;
}

.back-btn{
    justify-self:end;
    text-decoration:none;
    color:#0d47a1;
    background:white;
    padding:10px 20px;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    background:#e5e7eb;
    transform:translateY(-2px);
}

/* Register Section */
.register-section{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:85vh;
    padding:30px;
}

.register-card{
    background:white;
    width:100%;
    max-width:550px;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.register-card h1{
    text-align:center;
    margin-bottom:30px;
    color:#0d47a1;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

.form-group input:focus{
    outline:none;
    border-color:#0d47a1;
}

.register-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#0d47a1;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

.register-btn:hover{
    background:#08306b;
    transform:translateY(-2px);
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    text-decoration:none;
    color:#0d47a1;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

footer{
    text-align:center;
    padding:20px;
    color:#666;
}
</style>
</head>

<body>

<header>

    <div class="logo">
        ✈ SkyBook
        <span>Flight Ticket Management System</span>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Search Flight</a></li>
            <li><a href="#">My Booking</a></li>
            <li><a href="#">About Us</a></li>
        </ul>
    </nav>

    <a href="index.html" class="back-btn">← Back</a>

</header>

<section class="register-section">

    <div class="register-card">

        <h1>Create Account</h1>

        <form>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label>Passport Number</label>
                <input type="text" placeholder="Enter your passport number">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password">
            </div>

            <button type="submit" class="register-btn">
                Create Account
            </button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="login.html">Login</a>
        </div>

    </div>

</section>

<footer>
    © 2026 SkyBook Flight Ticket Management System
</footer>

</body>
</html>
