<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Logo.png">
<link rel="stylesheet" href="style.css">
<title>Search Flight - SkyBook</title>
</head>

<body>

<header>

    <div class="logo">
        ✈ SkyBook
        <span>Flight Ticket Management System</span>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="search-flight.html">Search Flight</a></li>
            <li><a href="dashboard.html">My Booking</a></li>
            <li><a href="#">About Us</a></li>
        </ul>
    </nav>

    <a href="dashboard.html" class="back-btn">← Dashboard</a>

</header>

<main>

<div class="search-container">

    <div class="search-card">

        <h2>Flight Search Form</h2>

        <div class="form-group">
            <label>Departure City</label>
            <select>
                <option>Kuala Lumpur</option>
                <option>Johor Bahru</option>
                <option>Penang</option>
                <option>Kuching</option>
            </select>
        </div>

        <div class="form-group">
            <label>Destination City</label>
            <select>
                <option>Singapore</option>
                <option>Bangkok</option>
                <option>Tokyo</option>
                <option>Seoul</option>
            </select>
        </div>

        <div class="form-group">
            <label>Departure Date</label>
            <input type="date">
        </div>

        <div class="form-group">
            <label>Return Date</label>
            <input type="date">
        </div>

        <div class="form-group">
            <label>Passengers</label>
            <select>
                <option>1 Passenger</option>
                <option>2 Passengers</option>
                <option>3 Passengers</option>
                <option>4 Passengers</option>
            </select>
        </div>

        <a href="flight-results.html" class="search-btn">
            Search Flight
        </a>

    </div>

</div>

</main>

<footer>
    © 2026 SkyBook Flight Ticket Management System
</footer>

</body>
</html>
