<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Logo.png">
<link rel="stylesheet" href="style.css">
<title>Search Flight - SkyBook</title>
</head>

<body>

<header>

    <a href="index.html" class="logo" style="text-decoration:none;color:white;">
        ✈ SkyBook
        <span>Flight Ticket Management System</span>
    </a>

    <nav>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="search-flight.html">Search Flight</a></li>
            <li><a href="my-booking.html">My Booking</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
    </nav>

    <a href="#"
       onclick="history.back(); return false;"
       class="back-btn">
            ← Back
    </a>

</header>
    
<div class="search-container">

    <div class="search-card">

        <h2>Flight Search Form</h2>

        <div class="form-group">
            <label>Departure City</label>
            <select id="departureCity">
                <option>Kuala Lumpur</option>
                <option>Johor Bahru</option>
                <option>Penang</option>
                <option>Kuching</option>
            </select>
        </div>

        <div class="form-group">
            <label>Destination City</label>
            <select id="destinationCity">
                <option>Singapore</option>
                <option>Bangkok</option>
                <option>Tokyo</option>
                <option>Seoul</option>
            </select>
        </div>

        <div class="form-group">
            <label>Departure Date</label>
            <input type="date" id="departureDate">
        </div>

        <div class="form-group">
            <label>Return Date</label>
            <input type="date" id="returnDate">
        </div>

        <div class="form-group">
            <label>Passengers</label>
            <select id="passengers">
                <option>1 Passenger</option>
                <option>2 Passengers</option>
                <option>3 Passengers</option>
                <option>4 Passengers</option>
            </select>
        </div>

        <a href="#" class="search-btn" onclick="searchFlight()">
            Search Flight
        </a>

    </div>

</div>
    
<footer>
    © 2026 SkyBook Flight Ticket Management System
</footer>

<script>

function searchFlight(){

    localStorage.setItem(
        "departureCity",
        document.getElementById("departureCity").value
    );

    localStorage.setItem(
        "destinationCity",
        document.getElementById("destinationCity").value
    );

    localStorage.setItem(
        "departureDate",
        document.getElementById("departureDate").value
    );

    localStorage.setItem(
        "returnDate",
        document.getElementById("returnDate").value
    );

    localStorage.setItem(
        "passengers",
        document.getElementById("passengers").value
    );

    window.location.href = "flight-results.html";
}

</script>

<script>

window.addEventListener("keydown", function(e){

    if(
        (e.metaKey || e.ctrlKey)
        &&
        e.shiftKey
        &&
        e.key.toLowerCase() === "r"
    ){

        localStorage.removeItem(
        "isLoggedIn"
        );

        localStorage.setItem(
        "sessionExpired",
        "true"
        );

    }

});

</script>

<script>

window.onload = function(){

    if(
        localStorage.getItem("sessionExpired")
        ===
        "true"
    ){

        localStorage.removeItem(
        "sessionExpired"
        );

        localStorage.setItem(
        "redirectAfterLogin",
        "search-flight.html"
        );

        alert(
        "Your session has ended. Please login again."
        );

        window.location.href =
        "login.html";

    }

}

</script>
    
</body>
</html>
