<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Logo.png">
<link rel="stylesheet" href="style.css">
<title>Admin Dashboard - SkyBook</title>
</head>

<body>

<header>

<a href="index.html"
class="logo"
style="text-decoration:none;color:white;">

✈ SkyBook
<span>Flight Ticket Management System</span>

</a>

<nav>
<ul>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="search-flight.html">Search Flight</a></li>
<li><a href="my-booking.html">My Booking</a></li>
<li><a href="profile.html">Profile</a></li>
</ul>
</nav>

<div style="
position:absolute;
right:50px;
display:flex;
gap:10px;
align-items:center;
">

<a href="#"
onclick="history.back();return false;"
class="back-btn">
← Back
</a>

<a href="#"
onclick="logoutUser();return false;"
class="register-btn">
Logout
</a>

</div>

</header>

<section class="login-section">

<div class="booking-card"
style="
max-width:1200px;
width:95%;
">

<h1 style="
text-align:center;
color:#0d47a1;
margin-bottom:25px;">
Admin Dashboard
</h1>

<div class="search-summary">

<h3>Registered Users</h3>

<div id="userList">

</div>

<div style="margin-top:20px;">

<button
onclick="resetSystem()"
class="search-btn"
style="width:100%;">
Factory Reset
</button>

</div>

</div>

</div>

</section>

<footer>
© 2026 SkyBook Flight Ticket Management System
</footer>

<script>

const users =
JSON.parse(
localStorage.getItem("users")
) || [];

const userList =
document.getElementById(
"userList"
);

if(users.length === 0){

userList.innerHTML = `
<div class="summary-item">
<strong>No registered users found.</strong>
</div>
`;

}else{

users.forEach(function(user,index){

userList.innerHTML += `

<div style="
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
">

<strong>User ${index + 1}</strong>

<br><br>

Full Name:
${user.fullName || "-"}

<br>

Email:
${user.email || "-"}

<br>

Phone:
${user.phone || "-"}

<br>

Username:
${user.username || "-"}

</div>

`;

});

}

function resetSystem(){

if(confirm(
"Reset the entire system and delete all registered accounts?"
)){

localStorage.clear();

alert(
"Factory reset completed successfully."
);

window.location.href =
"index.html";

}

}

function logoutUser(){

localStorage.removeItem(
"isLoggedIn"
);

localStorage.removeItem(
"isAdmin"
);

window.location.href =
"login.html";

}

</script>

</body>
</html>
