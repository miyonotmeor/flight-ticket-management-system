<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Logo.png">
<link rel="stylesheet" href="style.css">
<title>Edit Profile - SkyBook</title>
</head>

<body>

<header>

<a href="index.html"
class="logo"
style="text-decoration:none;color:white;">

✈ SkyBook
<span>Flight Ticket Management System</span>

</a>

<nav>
<ul>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="search-flight.html">Search Flight</a></li>
<li><a href="my-booking.html">My Booking</a></li>
<li><a href="profile.html">Profile</a></li>
</ul>
</nav>

<div style="
position:absolute;
right:50px;
display:flex;
gap:10px;
align-items:center;
">

<a href="profile.html"
class="back-btn">
← Back
</a>

<a href="#"
onclick="logoutUser();return false;"
class="register-btn">
Logout
</a>

</div>

</header>

<section class="login-section">

<div class="booking-card"
style="
max-width:1000px;
width:95%;
padding:20px;
">

<h1 style="
text-align:center;
color:#0d47a1;
margin-bottom:25px;">
Edit Profile
</h1>

<div class="search-summary">

<h3>Edit Information</h3>

<div style="
display:grid;
grid-template-columns:220px 1fr;
gap:20px;
align-items:start;
">

<div style="
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
">

<img
id="previewImage"
src="images/default-profile.jpg"
style="
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
">

<input
type="file"
id="profileUpload"
accept="image/*">

</div>

<div>

<div style="
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="fullName">
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" id="phone">
</div>

<div class="form-group">
<label>Gender</label>
<select id="gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>
</div>

<div class="form-group">
<label>Country</label>
<input type="text" id="country">
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" id="dob">
</div>

</div>

<button
onclick="saveProfile()"
class="search-btn"
style="
width:100%;
margin-top:15px;
">
Save Changes
</button>

</div>

</div>

</div>

</section>

<footer>
© 2026 SkyBook Flight Ticket Management System
</footer>

<script>

const user =
JSON.parse(
localStorage.getItem("currentUser")
);

if(user){

document.getElementById("fullName").value =
user.fullName || "";

document.getElementById("email").value =
user.email || "";

document.getElementById("phone").value =
user.phone || "";

document.getElementById("gender").value =
user.gender || "Male";

document.getElementById("country").value =
user.country || "";

document.getElementById("dob").value =
user.dob || "";

if(user.profileImage){

document.getElementById("previewImage").src =
user.profileImage;

}

}

document.getElementById("profileUpload")
.addEventListener("change",function(event){

const file =
event.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload = function(e){

const img = new Image();

img.onload = function(){

const canvas =
document.createElement("canvas");

const ctx =
canvas.getContext("2d");

canvas.width = 200;
canvas.height = 200;

ctx.drawImage(
img,
0,
0,
200,
200
);

document.getElementById(
"previewImage"
).src =
canvas.toDataURL(
"image/jpeg",
0.7
);

};

img.src = e.target.result;

};
reader.readAsDataURL(file);

});

function saveProfile(){

let user =
JSON.parse(
localStorage.getItem("currentUser")
);

if(!user){

alert("User not found.");

return;

}

user.fullName =
document.getElementById("fullName").value;

user.email =
document.getElementById("email").value;

user.phone =
document.getElementById("phone").value;

user.gender =
document.getElementById("gender").value;

user.country =
document.getElementById("country").value;

user.dob =
document.getElementById("dob").value;

if(
document.getElementById("previewImage").src.length < 500000
){
user.profileImage =
document.getElementById("previewImage").src;
}
localStorage.setItem(
"user",
JSON.stringify(user)
);

localStorage.setItem(
"currentUser",
JSON.stringify(user)
);

let users =
JSON.parse(
localStorage.getItem("users")
) || [];

users =
users.map(function(u){

if(u.email === user.email){

return user;

}

return u;

});

localStorage.setItem(
"users",
JSON.stringify(users)
);

alert(
"Profile updated successfully!"
);

window.location.href =
"profile.html";

}

function logoutUser(){

localStorage.removeItem(
"isLoggedIn"
);

window.location.href =
"login.html";

}

</script>

</body>
</html>
