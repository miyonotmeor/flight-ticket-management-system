<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Logo.png">
<link rel="stylesheet" href="style.css">
<title>Login - SkyBook</title>
</head>

<body>

<header>

    <a href="index.html"
class="logo"
style="text-decoration:none;color:white;">

    ✈ SkyBook
    <span>Flight Ticket Management System</span>

</a>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li>
    <a href="#"
    onclick="requireLogin('search-flight.html')">
        Search Flight
    </a>
</li>

<li>
    <a href="#"
    onclick="requireLogin('my-booking.html')">
        My Booking
    </a>
</li>
            <li><a href="about.html">About Us</a></li>
        </ul>
    </nav>

</header>

<section class="login-section">

    <div class="login-card">

        <h1>Login</h1>

        <form onsubmit="return loginUser()">

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email address" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox" id="rememberMe">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="search-btn">
                Login
            </button>

        </form>

        <div class="register-link">
            Don't have an account?
            <a href="register.html">Register</a>
        </div>

    </div>

</section>

<footer>
    © 2026 SkyBook Flight Ticket Management System
</footer>

<script>

window.onload = function(){

    const savedEmail =
    localStorage.getItem("rememberedEmail");

    if(savedEmail){

        document.getElementById("email").value =
        savedEmail;

        document.getElementById("rememberMe").checked =
        true;
    }
}

function rememberUser(){

    const email =
    document.getElementById("email").value;

    const remember =
    document.getElementById("rememberMe").checked;

    if(remember){

        localStorage.setItem(
            "rememberedEmail",
            email
        );

    }else{

        localStorage.removeItem(
            "rememberedEmail"
        );
    }
}

function loginUser(){

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    if(
email === "admin@skybook.com" &&
password === "admin123"
){

    localStorage.setItem(
    "isLoggedIn",
    "true"
    );

    window.location.href =
    "admin.html";

    return false;

}

const users =
JSON.parse(
localStorage.getItem("users")
) || [];

const registeredEmail =
users.find(function(u){

    return u.email === email;

});

if(!registeredEmail){

    alert(
    "This email address is not registered yet. Please create an account first."
    );

    window.location.href =
    "register.html";

    return false;

}

const user =
users.find(function(u){

    return u.email === email &&
           u.password === password;

});

if(!user){

    alert(
    "Incorrect password. Please try again."
    );

    return false;

}

    rememberUser();

localStorage.setItem(
"isLoggedIn",
"true"
);

localStorage.setItem(
"currentUser",
JSON.stringify(user)
);

const redirectPage =
localStorage.getItem(
"redirectAfterLogin"
);

if(redirectPage){

    localStorage.removeItem(
    "redirectAfterLogin"
    );

    window.location.href =
    redirectPage;

}else{

    window.location.href =
    "index.html";

}

return false;

}

</script>

<script>

function requireLogin(page){

    if(localStorage.getItem("isLoggedIn") === "true"){

        window.location.href = page;

    }else{

        localStorage.setItem(
        "redirectAfterLogin",
        page
        );

        alert(
        "You are not logged in yet. Please login first."
        );

        window.location.href =
        "login.html";

    }

}

</script>
    
</body>
</html>
