<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Logo.png">
<link rel="stylesheet" href="style.css">
<title>My Booking - SkyBook</title>
</head>

<body>

<header>

    <div class="logo"
         onclick="window.location.href='index.html';"
         style="cursor:pointer;">
        ✈ SkyBook
        <span>Flight Ticket Management System</span>
    </div>

    <nav>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="search-flight.html">Search Flight</a></li>
            <li><a href="my-booking.html">My Booking</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
    </nav>

    <div style="
position:absolute;
right:50px;
display:flex;
gap:10px;
align-items:center;
">

    <a href="#"
       onclick="history.back(); return false;"
       class="back-btn">
        ← Back
    </a>

    <a href="#"
       onclick="logoutUser(); return false;"
       class="register-btn">
        Logout
    </a>

</div>

</header>

<section class="login-section">

    <div class="booking-card">

        <h1 style="text-align:center; margin-bottom:25px; color:#0d47a1;">
            My Booking
        </h1>

<div style="
display:grid;
grid-template-columns:2fr 2fr 1fr 1.5fr 1fr 120px;
gap:15px;
padding:0 15px 10px 15px;
font-weight:bold;
color:#0d47a1;
">

    <div>Airline</div>
    <div>Route</div>
    <div>Date</div>
    <div>Time</div>
    <div>Status</div>
    <div>Pax</div>
    <div>Receipt</div>

</div>

<div id="bookingList"
style="
max-height:350px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
">
    
</div>

    </div>

</section>

<footer>
    © 2026 SkyBook Flight Ticket Management System
</footer>

<script>

const bookings =
JSON.parse(
localStorage.getItem("bookings")
) || [];

bookings.sort(function(a,b){

    return new Date(a.departureDate)
    -
    new Date(b.departureDate);

});

const bookingList =
document.getElementById("bookingList");

if(bookings.length === 0){

    bookingList.innerHTML = `
    <div class="summary-item">
        <strong>No bookings found.</strong>
    </div>
    `;

}else{

    bookings.forEach(function(booking,index){

    const today = new Date();

const departureDate =
new Date(booking.departureDate);

let status = "Upcoming";

if(departureDate < today){

    status = "Completed";

}
        
        bookingList.innerHTML += `

        <div style="
display:grid;
grid-template-columns:2fr 2fr 1fr 1.5fr 1fr 1fr 120px;
align-items:center;
gap:15px;
padding:15px;
background:white;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
">

            <div>
    <strong>${booking.airline || "-"}</strong>
</div>

<div>
    ${booking.route || 
(localStorage.getItem("departureCity") + " → " +
localStorage.getItem("destinationCity"))}
</div>

<div>
    ${booking.departureDate || "-"}
</div>

<div>
    ${booking.time || "-"}
</div>

<div>
    ${status}
</div>

<div>
    ${booking.passengers || "-"}
</div>

<div>
    <a href="#"
       class="card-btn"
       onclick="viewReceipt(${index})">
       View
    </a>
</div>

        </div>

        `;

    });

}

    function viewReceipt(index){

    localStorage.setItem(
    "selectedReceipt",
    index
    );

    window.location.href =
    "view-receipt.html";

}

</script>

<script>

function logoutUser(){

    localStorage.removeItem(
    "isLoggedIn"
    );

    alert(
    "You have logged out successfully."
    );

    window.location.href =
    "index.html";

}

</script>
    
</body>
</html>
