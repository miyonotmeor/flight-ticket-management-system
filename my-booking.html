<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Logo.png">
<link rel="stylesheet" href="style.css">
<title>My Booking - SkyBook</title>
</head>

<body>

<header>

    <div class="logo"
         onclick="window.location.href='index.html';"
         style="cursor:pointer;">
        ✈ SkyBook
        <span>Flight Ticket Management System</span>
    </div>

    <nav>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="search-flight.html">Search Flight</a></li>
            <li><a href="my-booking.html">My Booking</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
    </nav>

    <div style="
position:absolute;
right:50px;
display:flex;
gap:10px;
align-items:center;
">

    <a href="#"
       onclick="history.back(); return false;"
       class="back-btn">
        ← Back
    </a>

    <a href="#"
       onclick="logoutUser(); return false;"
       class="register-btn">
        Logout
    </a>

</div>

</header>

<section class="login-section">

    <div class="booking-card">

        <h1 style="text-align:center; margin-bottom:25px; color:#0d47a1;">
            My Booking
        </h1>

        <h3 style="
color:#0d47a1;
margin-bottom:20px;
text-align:center;
">
My Bookings
</h3>

<div id="bookingList"
style="
max-height:500px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:15px;
">
</div>

<div style="margin-top:20px;">

    <a href="dashboard.html"
       class="search-btn"
       style="width:100%;display:block;text-align:center;">
        Dashboard
    </a>

</div>

    </div>

</section>

<footer>
    © 2026 SkyBook Flight Ticket Management System
</footer>

<script>

const bookings =
JSON.parse(
localStorage.getItem("bookings")
) || [];

const bookingList =
document.getElementById("bookingList");

if(bookings.length === 0){

    bookingList.innerHTML = `
    <div class="summary-item">
        <strong>No bookings found.</strong>
    </div>
    `;

}else{

    bookings.forEach(function(booking,index){

        bookingList.innerHTML += `

        <div class="search-summary">

            <div class="summary-grid">

                <div class="summary-item">
                    <span>Airline</span>
                    <strong>${booking.airline}</strong>
                </div>

                <div class="summary-item">
                    <span>Route</span>
                    <strong>${booking.route}</strong>
                </div>

                <div class="summary-item">
                    <span>Date</span>
                    <strong>${booking.departureDate}</strong>
                </div>

                <div class="summary-item">
                    <span>Passengers</span>
                    <strong>${booking.passengers}</strong>
                </div>

            </div>

            <a href="#"
               class="search-btn"
               style="
               margin-top:15px;
               display:block;
               text-align:center;
               "
               onclick="viewReceipt(${index})">
               View Receipt
            </a>

        </div>

        `;

    });

}

    function viewReceipt(index){

    localStorage.setItem(
    "selectedReceipt",
    index
    );

    window.location.href =
    "view-receipt.html";

}

</script>

<script>

function logoutUser(){

    localStorage.removeItem(
    "isLoggedIn"
    );

    alert(
    "You have logged out successfully."
    );

    window.location.href =
    "index.html";

}

</script>
    
</body>
</html>
