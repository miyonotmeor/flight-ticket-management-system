<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Logo.png">
<link rel="stylesheet" href="style.css">
<title>My Booking - SkyBook</title>
</head>

<body>

<header>

    <div class="logo"
         onclick="window.location.href='index.html';"
         style="cursor:pointer;">
        ✈ SkyBook
        <span>Flight Ticket Management System</span>
    </div>

    <nav>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="search-flight.html">Search Flight</a></li>
            <li><a href="my-booking.html">My Booking</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
    </nav>

    <div style="
position:absolute;
right:50px;
display:flex;
gap:10px;
align-items:center;
">

    <a href="#"
       onclick="history.back(); return false;"
       class="back-btn">
        ← Back
    </a>

    <a href="#"
       onclick="logoutUser(); return false;"
       class="register-btn">
        Logout
    </a>

</div>

</header>

<section class="login-section">

    <div class="booking-card">

        <h1 style="text-align:center; margin-bottom:25px; color:#0d47a1;">
            My Booking
        </h1>

        <div class="search-summary">

            <h3>Booking Details</h3>

            <div class="summary-grid">

                <div class="summary-item">
                    <span>Booking ID</span>
                    <strong>BK001</strong>
                </div>

                <div class="summary-item">
                    <span>Status</span>
                    <strong>Confirmed</strong>
                </div>

                <div class="summary-item">
                    <span>Airline</span>
                    <strong id="airlineDisplay"></strong>
                </div>

                <div class="summary-item">
                    <span>Route</span>
                    <strong id="routeDisplay"></strong>
                </div>

                <div class="summary-item">
                    <span>Date</span>
                    <strong id="dateDisplay"></strong>
                </div>

                <div class="summary-item">
                    <span>Time</span>
                    <strong id="timeDisplay"></strong>
                </div>

                <div class="summary-item">
                    <span>Passengers</span>
                    <strong id="passengerDisplay"></strong>
                </div>

                <div class="summary-item">
                    <span>Total Amount</span>
                    <strong id="totalDisplay"></strong>
                </div>

            </div>

        </div>

        <div style="display:flex; gap:15px; margin-top:20px;">

            <a href="view-receipt.html"
               class="search-btn"
               style="flex:1;">
                View Receipt
            </a>

            <a href="dashboard.html"
               class="search-btn"
               style="flex:1;">
                Dashboard
            </a>

        </div>

    </div>

</section>

<footer>
    © 2026 SkyBook Flight Ticket Management System
</footer>

<script>

// Airline
document.getElementById("airlineDisplay").textContent =
localStorage.getItem("selectedAirline") || "No Booking";

// Route
document.getElementById("routeDisplay").textContent =
(localStorage.getItem("departureCity") || "") +
" → " +
(localStorage.getItem("destinationCity") || "");

// Date
document.getElementById("dateDisplay").textContent =
localStorage.getItem("departureDate") || "-";

// Time
document.getElementById("timeDisplay").textContent =
localStorage.getItem("selectedTime") || "-";

// Passengers
document.getElementById("passengerDisplay").textContent =
localStorage.getItem("passengers") || "-";

// Price
const ticketPrice =
localStorage.getItem("selectedPrice") || "RM129";

const numericPrice =
parseInt(ticketPrice.replace("RM",""));

document.getElementById("totalDisplay").textContent =
"RM" + (numericPrice + 20);

</script>

<script>

function logoutUser(){

    localStorage.removeItem(
    "isLoggedIn"
    );

    alert(
    "You have logged out successfully."
    );

    window.location.href =
    "index.html";

}

</script>
    
</body>
</html>
