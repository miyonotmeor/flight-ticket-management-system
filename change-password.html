<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Logo.png">
<link rel="stylesheet" href="style.css">
<title>Change Password - SkyBook</title>
</head>

<body>

<header>

<a href="index.html"
class="logo"
style="text-decoration:none;color:white;">

✈ SkyBook
<span>Flight Ticket Management System</span>

</a>

<nav>
<ul>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="search-flight.html">Search Flight</a></li>
<li><a href="my-booking.html">My Booking</a></li>
<li><a href="profile.html">Profile</a></li>
</ul>
</nav>

<div style="
position:absolute;
right:50px;
display:flex;
gap:10px;
align-items:center;
">

<a href="profile.html"
class="back-btn">
← Back
</a>

<a href="#"
onclick="logoutUser();return false;"
class="register-btn">
Logout
</a>

</div>

</header>

<section class="login-section">

<div class="booking-card"
style="
max-width:700px;
width:95%;
">

<h1 style="
text-align:center;
color:#0d47a1;
margin-bottom:25px;">
Change Password
</h1>

<div class="search-summary">

<div class="form-group">
<label>Current Password</label>
<input
type="password"
id="currentPassword">
</div>

<div class="form-group">
<label>New Password</label>
<input
type="password"
id="newPassword">
</div>

<div class="form-group">
<label>Confirm New Password</label>
<input
type="password"
id="confirmPassword">
</div>

<button
onclick="changePassword()"
class="search-btn"
style="width:100%;">
Update Password
</button>

</div>

</div>

</section>

<footer>
© 2026 SkyBook Flight Ticket Management System
</footer>

<script>

function changePassword(){

const currentPassword =
document.getElementById(
"currentPassword"
).value;

const newPassword =
document.getElementById(
"newPassword"
).value;

const confirmPassword =
document.getElementById(
"confirmPassword"
).value;

let user =
JSON.parse(
localStorage.getItem(
"currentUser"
)
);

if(!user){

alert(
"User not found."
);

return;

}

if(
currentPassword !==
user.password
){

alert(
"Current password is incorrect."
);

return;

}

if(
newPassword.length < 6
){

alert(
"Password must be at least 6 characters."
);

return;

}

if(
newPassword !==
confirmPassword
){

alert(
"Passwords do not match."
);

return;

}

user.password =
newPassword;

localStorage.setItem(
"user",
JSON.stringify(user)
);

localStorage.setItem(
"currentUser",
JSON.stringify(user)
);

alert(
"Password updated successfully!"
);

window.location.href =
"profile.html";

}

function logoutUser(){

localStorage.removeItem(
"isLoggedIn"
);

window.location.href =
"login.html";

}

</script>

</body>
</html>
