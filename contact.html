<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Logo.png">
<link rel="stylesheet" href="style.css">
<title>Contact Support - SkyBook</title>
</head>

<body>

<header>

    <a href="#"
onclick="goHome()"
class="logo"
style="text-decoration:none;color:white;">

    ✈ SkyBook
    <span>Flight Ticket Management System</span>

</a>

    <nav>
<ul>

<li>
<a href="#"
onclick="checkLogin('dashboard.html')">
Dashboard
</a>
</li>

<li>
<a href="#"
onclick="checkLogin('search-flight.html')">
Search Flight
</a>
</li>

<li>
<a href="#"
onclick="checkLogin('my-booking.html')">
My Booking
</a>
</li>

<li>
<a href="#"
onclick="checkLogin('profile.html')">
Profile
</a>
</li>

</ul>
</nav>

    <div style="
position:absolute;
right:50px;
display:flex;
gap:10px;
align-items:center;
">

<a href="#"
onclick="history.back();return false;"
class="back-btn">
← Back
</a>

<a href="#"
onclick="logoutUser();return false;"
class="register-btn"
id="logoutBtn"
style="display:none;">
Logout
</a>

</div>

</header>

<section class="login-section">

    <div class="booking-card" style="padding:15px;">

        <h1 style="
        text-align:center;
        color:#0d47a1;
        margin-bottom:10px;">
            Contact Support
        </h1>

        <div class="search-summary">

            <h3>Support Information</h3>

            <div style="
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:12px;
            ">

                <div class="summary-item">
                    <span>Email</span>
                    <strong>support@skybook.com</strong>
                </div>

                <div class="summary-item">
                    <span>Phone</span>
                    <strong>+60 3-1234 5678</strong>
                </div>

                <div class="summary-item">
                    <span>Operating Hours</span>
                    <strong>24/7 Support</strong>
                </div>

            </div>

        <br>

        <div class="search-summary">

            <h3>Send Us A Message</h3>

            <div class="form-group">
                <label>Full Name</label>
                <input
                type="text"
                id="name"
                placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input
                type="email"
                id="email"
                placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea
                id="message"
                rows="2"
                style="
                width:100%;
                padding:12px;
                border:1px solid #ddd;
                border-radius:10px;
                resize:none;
                font-family:inherit;"
                placeholder="Enter your message here..."></textarea>
            </div>

        </div>

        <div class="receipt-buttons" style="margin-top:15px;">

            <button
            onclick="sendMessage()"
            class="search-btn">
                Submit Message
            </button>

            <button
            onclick="goToAbout()"
            class="search-btn">
                About Us
            </button>

        </div>

    </div>

</section>

<footer>
    © 2026 SkyBook Flight Ticket Management System
</footer>

<script>

function sendMessage(){

    const name =
    document.getElementById("name").value;

    const email =
    document.getElementById("email").value;

    const message =
    document.getElementById("message").value;

    if(name === "" || email === "" || message === ""){

        alert("Please complete all fields.");
        return;

    }

    alert(
    "Thank you for contacting SkyBook Support. Your message has been submitted successfully."
    );

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("message").value = "";

}

function goToAbout(){

    window.location.href = "about.html";

}

</script>

<script>

window.addEventListener("load",function(){

    if(
        localStorage.getItem("isLoggedIn")
        ===
        "true"
    ){

        document.getElementById(
        "logoutBtn"
        ).style.display =
        "inline-block";

    }

});

function logoutUser(){

    localStorage.removeItem(
    "isLoggedIn"
    );

    localStorage.removeItem(
    "currentUser"
    );

    alert(
    "You have logged out successfully."
    );

    window.location.href =
    "index.html";

}

function goHome(){

    if(
        localStorage.getItem("isLoggedIn")
        ===
        "true"
    ){

        window.location.href =
        "dashboard.html";

    }else{

        window.location.href =
        "index.html";

    }

}

</script>

<script>

function checkLogin(page){

    if(
        localStorage.getItem("isLoggedIn")
        ===
        "true"
    ){

        window.location.href =
        page;

    }else{

        localStorage.setItem(
        "redirectAfterLogin",
        page
        );

        alert(
        "You are not logged in yet. Please login first."
        );

        window.location.href =
        "login.html";

    }

}

</script>
    
</body>
</html>
