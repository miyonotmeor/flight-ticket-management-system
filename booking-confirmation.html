<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Logo.png">
<link rel="stylesheet" href="style.css">
<title>Booking Confirmation - SkyBook</title>
</head>

<body>

<header>

    <div class="logo">
        ✈ SkyBook
        <span>Flight Ticket Management System</span>
    </div>

    <nav>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="search-flight.html">Search Flight</a></li>
            <li><a href="#">My Booking</a></li>
            <li><a href="#">Profile</a></li>
        </ul>
    </nav>

    <a href="flight-results.html" class="back-btn">← Results</a>

</header>

<section class="login-section">

    <div class="booking-card">

        <h1>Booking Confirmation</h1>

        <div class="booking-top">

    <div class="search-summary">

        <h3>Selected Flight</h3>

        <div class="summary-grid">

            <div class="summary-item">
                <span>Airline</span>
                <strong id="airlineDisplay"></strong>
            </div>

            <div class="summary-item">
                <span>Route</span>
                <strong id="routeDisplay"></strong>
            </div>

            <div class="summary-item">
                <span>Date</span>
                <strong id="dateDisplay"></strong>
            </div>

            <div class="summary-item">
                <span>Time</span>
                <strong id="timeDisplay"></strong>
            </div>

        </div>

    </div>
            <div class="search-summary">

    <h3>Payment Summary</h3>

    <div class="summary-grid">

        <div class="summary-item">
            <span>Ticket Price</span>
            <strong id="ticketPrice"></strong>
        </div>

        <div class="summary-item">
            <span>Tax & Fees</span>
            <strong>RM20</strong>
        </div>

        <div class="summary-item">
            <span>Total Amount</span>
            <strong id="totalPrice"></strong>
        </div>

    </div>

</div>

        </div>

        <div class="form-group">
            <label>Passenger Name</label>
            <input type="text" id="passengerName" readonly>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="passengerEmail" readonly>
        </div>

        <div class="form-group">
            <label>Passengers</label>
            <input type="text" id="passengerCount" readonly>
        </div>

        <a href="booking-success.html" class="search-btn">
            Confirm Booking
        </a>

    </div>

</section>

<footer>
    © 2026 SkyBook Flight Ticket Management System
</footer>

<script>

// Selected Flight
document.getElementById("airlineDisplay").textContent =
localStorage.getItem("selectedAirline");

document.getElementById("routeDisplay").textContent =
localStorage.getItem("departureCity") +
" → " +
localStorage.getItem("destinationCity");

document.getElementById("dateDisplay").textContent =
localStorage.getItem("departureDate");

document.getElementById("timeDisplay").textContent =
localStorage.getItem("selectedTime");

// Payment
const ticketPrice =
localStorage.getItem("selectedPrice") || "RM129";

document.getElementById("ticketPrice").textContent =
ticketPrice;

const numericPrice =
parseInt(ticketPrice.replace("RM",""));

document.getElementById("totalPrice").textContent =
"RM" + (numericPrice + 20);

// Passenger Details
document.getElementById("passengerCount").value =
localStorage.getItem("passengers");

// Demo Account Information
document.getElementById("passengerName").value =
"Amirrul Mukminin";

document.getElementById("passengerEmail").value =
"amirrul.mukminin1980@gmail.com";

</script>
    
</body>
</html>
